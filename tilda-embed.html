<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AR</title>
  </head>
  <body>
    <!-- TILDA AR EMBED START: copy this block into Tilda T123 -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
      #poster-ar-root {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #ff66eb, transparent 32rem),
          #050816;
      }

      #poster-ar-viewer {
        position: relative;
        z-index: 1;
        width: 100vw;
        height: 100vh;
        background: transparent;
      }

      #poster-ar-viewer::part(default-ar-button) {
        display: none;
      }

      .poster-ar-actions {
        position: fixed;
        z-index: 20;
        right: max(16px, env(safe-area-inset-right));
        bottom: max(16px, env(safe-area-inset-bottom));
        left: max(16px, env(safe-area-inset-left));
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        pointer-events: none;
      }

      #poster-ar-cta,
      #poster-site-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 0;
        background: transparent;
        pointer-events: auto;
        text-decoration: none;
        cursor: pointer;
        touch-action: manipulation;
        min-width: 48px;
        min-height: 48px;
      }

      #poster-ar-cta img,
      #poster-site-cta img {
        display: block;
        width: auto;
        height: auto;
        max-width: min(100%, 520px);
        object-fit: contain;
        border: 0;
      }

      #poster-ar-cta img {
        max-height: 72px;
        pointer-events: none;
      }

      #poster-site-cta img {
        max-height: 74px;
      }

      #poster-ar-cta:focus-visible,
      #poster-site-cta:focus-visible {
        outline: 3px solid rgba(255, 255, 255, 0.95);
        outline-offset: 4px;
      }

      .poster-ar-hint {
        position: fixed;
        z-index: 5;
        top: max(16px, env(safe-area-inset-top));
        right: max(16px, env(safe-area-inset-right));
        left: max(16px, env(safe-area-inset-left));
        padding: 8px 12px;
        background: transparent;
        color: #ffffff;
        font: 700 14px/1.35 Arial, sans-serif;
        text-align: center;
        pointer-events: none;
      }

      #poster-ar-root:has(model-viewer[ar-status='session-started']) #poster-ar-hint {
        display: none;
      }
    </style>

    <div id="poster-ar-root">
      <model-viewer
        id="poster-ar-viewer"
        src="https://yakkuza13.github.io/ar_flower/models/pornozamok.glb"
        ios-src="https://yakkuza13.github.io/ar_flower/models/pornozamok.usdz"
        alt="3D model"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        camera-controls
        autoplay
        animation-loop
        loading="eager"
        reveal="auto"
        scale="0.5 0.5 0.5"
        shadow-intensity="1"
        xr-environment
        touch-action="pan-y"
      >
        <button slot="ar-button" type="button" hidden aria-hidden="true"></button>
      </model-viewer>

      <div id="poster-ar-hint" class="poster-ar-hint">
        Модель загружается
      </div>

      <div class="poster-ar-actions">
        <button id="poster-ar-cta" type="button" aria-label="Посмотреть AR">
          <img src="https://yakkuza13.github.io/ar_flower/ar-cta.png" alt="Посмотреть AR" />
        </button>

        <a id="poster-site-cta" href="http://roshvastore.com/" aria-label="Перейти на сайт">
          <img src="https://yakkuza13.github.io/ar_flower/site-cta.png" alt="Перейти на сайт" />
        </a>
      </div>
    </div>

    <script>
      ;(() => {
        const CDN_BASE = 'https://yakkuza13.github.io/ar_flower'
        const MODELS_BASE = 'https://yakkuza13.github.io/ar_flower/models'

        const ASSETS = {
          glb: `${MODELS_BASE}/pornozamok.glb`,
          usdz: `${MODELS_BASE}/pornozamok.usdz`,
          arCtaImage: `${CDN_BASE}/ar-cta.png`,
          siteCtaImage: `${CDN_BASE}/site-cta.png`,
          siteUrl: 'http://roshvastore.com/'
        }

        const viewer = document.querySelector('#poster-ar-viewer')
        const cta = document.querySelector('#poster-ar-cta')
        const hint = document.querySelector('#poster-ar-hint')

        if (!viewer || !cta || !hint) {
          console.error('Poster AR controls failed to initialize')
          return
        }

        viewer.src = ASSETS.glb
        viewer.setAttribute('ios-src', ASSETS.usdz)

        const buttonCtaImg = cta.querySelector('img')
        if (buttonCtaImg) buttonCtaImg.src = ASSETS.arCtaImage

        const siteCta = document.querySelector('#poster-site-cta')
        const siteCtaImg = siteCta?.querySelector('img')
        if (siteCta) siteCta.href = ASSETS.siteUrl
        if (siteCtaImg) siteCtaImg.src = ASSETS.siteCtaImage

        const setHint = message => {
          hint.textContent = message
        }

        const playModelAnimation = () => {
          const animations = viewer.availableAnimations ?? []
          const [firstAnimation, ...otherAnimations] = animations

          if (!firstAnimation) {
            console.warn('Poster AR: GLB has no animations')
            return
          }

          viewer.animationName = firstAnimation
          viewer.timeScale = 1
          viewer.play({ repetitions: Infinity })

          otherAnimations.forEach(name => {
            if (typeof viewer.appendAnimation === 'function') {
              viewer.appendAnimation(name, { repetitions: Infinity })
            }
          })
        }

        const launchAr = async () => {
          try {
            setHint('Открываю AR...')
            await viewer.activateAR()
          } catch (error) {
            setHint('AR не открылся. Проверь USDZ или открой в Safari на iPhone.')
            console.error('Poster AR failed to activate', error)
          }
        }

        cta.addEventListener('click', launchAr)

        viewer.addEventListener('load', () => {
          playModelAnimation()
          setHint('Модель загружена. Нажми кнопку, чтобы открыть AR.')
        })

        viewer.addEventListener('ar-status', event => {
          if (event.detail.status === 'session-started') {
            playModelAnimation()
            setHint('AR запущен.')
          }
        })
      })()
    </script>
    <!-- TILDA AR EMBED END -->
  </body>
</html>
